      /* FIXED: Enhanced initial loader with exit animation support */
      .initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #f9fafb;
        z-index: 9999;
        transition: opacity 0.3s ease-out; /* FIXED: Synchronized with JS */
        will-change: opacity;
      }
      
      .initial-loader.dark {
        background: #111827;
      }
      
      .initial-loader.exit {
        opacity: 0;
        pointer-events: none;
      }
      
      .initial-loader.hidden {
        opacity: 0;
        pointer-events: none;
      }
      
      .initial-loader .spinner {
        width: 40px;
        height: 40px;
        border: 3px solid #e5e7eb;
        border-top-color: #3b82f6;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      
      @media (prefers-color-scheme: dark) {
        .initial-loader .spinner {
          border-color: #374151;
          border-top-color: #60a5fa;
        }
      }
      
      .initial-loader .loading-text {
        font-family: 'Inter', 'Inter Fallback', sans-serif;
        font-size: 14px;
        color: #6b7280;
        animation: pulse 1.5s ease-in-out infinite;
      }
      
      @media (prefers-color-scheme: dark) {
        .initial-loader .loading-text {
          color: #9ca3af;
        }
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      
      /* Respect reduced motion */
      @media (prefers-reduced-motion: reduce) {
        .initial-loader .spinner {
          animation: none;
          border-top-color: transparent;
          border-color: #e5e7eb;
        }
        
        .initial-loader .loading-text {
          animation: none;
        }
        
        .initial-loader.exit {
          opacity: 0;
        }
      }

    <!-- FIXED: Unified loader removal logic with preload class management -->
    <script>
      (function() {
        'use strict';
        
        // Dark mode initialization (must run before React to prevent FOUC)
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const savedTheme = localStorage.getItem('theme');
        const isDark = savedTheme === 'dark' || (savedTheme !== 'light' && prefersDark);
        
        if (isDark) {
          document.documentElement.classList.add('dark');
          document.getElementById('initial-loader').classList.add('dark');
        }
        
        // Set color scheme meta
        document.documentElement.style.colorScheme = isDark ? 'dark' : 'light';
        
        // FIXED: Unified loader removal - this is the ONLY removal function
        window.removeInitialLoader = function() {
          var loader = document.getElementById('initial-loader');
          if (!loader) return;
          
          // Add exit class for CSS transition
          loader.classList.add('exit');
          
          // Remove after transition completes
          var transitionDuration = 300; // matches CSS transition
          
          var cleanup = function() {
            if (loader && loader.parentNode) {
              loader.parentNode.removeChild(loader);
            }
            // Remove preload class to enable transitions
            document.documentElement.classList.remove('preload');
          };
          
          // Remove after transition
          setTimeout(cleanup, transitionDuration);
          
          // Fallback: ensure removal even if transition fails
          setTimeout(cleanup, transitionDuration + 500);
        };
        
        // Fallback timeout if React fails to mount
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader && !loader.classList.contains('exit')) {
            console.warn('Application load timeout - forcing loader removal');
            window.removeInitialLoader();
          }
        }, 8000); // Increased from 5s to 8s for slower connections
      })();
    </script>
