# ── Build Configuration ───────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10.8.2"
  NODE_ENV = "production"
  CI = "true"
  GENERATE_SOURCEMAP = "false"
  REACT_APP_NAME = "ResumeAI Pro"
  REACT_APP_VERSION = "2.5.0"
  REACT_APP_ENVIRONMENT = "production"
  REACT_APP_ENABLE_ANALYTICS = "true"

# ── Redirects ─────────────────────────────────────────────────────────────

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# ── Headers ────────────────────────────────────────────────────────────────

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

# Static assets - long cache
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# JavaScript files
[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=UTF-8"

# CSS files
[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css; charset=UTF-8"

# Service Worker - no cache
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, max-age=0"

# HTML - no cache for SPA
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"