# ── Build Configuration ───────────────────────────────────────────────────

[build]
  command = "npm run build"
  publish = "build"

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10.8.2"
  NODE_ENV = "production"
  CI = "true"
  GENERATE_SOURCEMAP = "false"
  REACT_APP_NAME = "ResumeAI Pro"
  REACT_APP_VERSION = "2.5.0"
  REACT_APP_ENVIRONMENT = "production"
  REACT_APP_ENABLE_ANALYTICS = "true"

# ⚠️ NOTE: Sensitive environment variables (API keys, secrets) should be set
# in Netlify's UI under Site Settings → Environment Variables, NOT here.

# ── Redirects ─────────────────────────────────────────────────────────────

# Force trailing slash for SEO consistency
[[redirects]]
  from = "/*"
  to = "/:splat/"
  status = 301
  force = false
  conditions = { Language = [] }

# SPA fallback — all unmatched routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

# Custom 404 page
[[redirects]]
  from = "/404"
  to = "/404.html"
  status = 200

# ── Headers ────────────────────────────────────────────────────────────────

# ── Security Headers (ALL routes) ────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking
    X-Frame-Options = "DENY"
    
    # Prevent MIME type sniffing
    X-Content-Type-Options = "nosniff"
    
    # Control referrer information
    Referrer-Policy = "strict-origin-when-cross-origin"
    
    # Restrict browser features
    Permissions-Policy = "camera=(), microphone=(), geolocation=(self), interest-cohort=()"
    
    # HSTS (only if your domain has HTTPS — Netlify does by default)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    
    # Cross-origin isolation for SharedArrayBuffer (if needed)
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    Cross-Origin-Embedder-Policy = "require-corp"
    
    # DNS prefetch control
    X-DNS-Prefetch-Control = "on"

# ── Content Security Policy ──────────────────────────────────────────────

[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.sentry.io https://www.googletagmanager.com https://*.google-analytics.com https://*.firebaseio.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https: blob:;
      connect-src 'self' https://*.sentry.io https://*.googleapis.com https://*.firebaseio.com https://*.cloudfunctions.net https://*.netlify.app wss://*.firebaseio.com;
      frame-src 'self' https://*.firebaseapp.com https://*.stripe.com;
      media-src 'self';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    """

# ── Static Assets — Long Cache ───────────────────────────────────────────

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── JavaScript Files ─────────────────────────────────────────────────────

[[headers]]
  for = "/*.js"
  [headers.values]
    Content-Type = "application/javascript; charset=UTF-8"
    Cache-Control = "public, max-age=31536000, immutable"

# ── CSS Files ────────────────────────────────────────────────────────────

[[headers]]
  for = "/*.css"
  [headers.values]
    Content-Type = "text/css; charset=UTF-8"
    Cache-Control = "public, max-age=31536000, immutable"

# ── Font Files ───────────────────────────────────────────────────────────

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Image Files ──────────────────────────────────────────────────────────

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    
[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Service Worker — No Cache ────────────────────────────────────────────

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"
    Service-Worker-Allowed = "/"

# ── SPA HTML — No Cache ──────────────────────────────────────────────────

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, max-age=0, must-revalidate"

# ── JSON / Manifest ──────────────────────────────────────────────────────

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Robots.txt ───────────────────────────────────────────────────────────

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"